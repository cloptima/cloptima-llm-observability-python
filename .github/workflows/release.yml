name: Python SDK Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cloptima-llm-observability
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          python -c 'import os, pathlib, tomllib; project = tomllib.loads(pathlib.Path("pyproject.toml").read_text()); package_version = project["project"]["version"]; ref_name = os.environ["GITHUB_REF_NAME"]; assert ref_name.startswith("v"), f"Release workflow requires a v-prefixed tag, got: {ref_name}"; tag_version = ref_name[1:]; assert package_version == tag_version, f"Tag version {tag_version} does not match pyproject.toml version {package_version}"'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
